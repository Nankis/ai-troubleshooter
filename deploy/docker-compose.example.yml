services:
  ai-troubleshooter:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: dev-server
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      HTTP_PORT: 8080
      CONNECTOR_MODE: mock
      AI_MODEL_PROFILE: qwen
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?set in local shell}
      LLM_ALLOW_RULE_FALLBACK: "false"
