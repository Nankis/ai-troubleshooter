openapi: 3.0.3
info:
  title: AI Troubleshooter Decision Engine / Agent Orchestrator
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: ok
  /v1/decisions/plan:
    post:
      summary: Create a bounded readonly tool plan for a case; this is the target Agent orchestration surface
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionRequest"
      responses:
        "200":
          description: decision plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
components:
  schemas:
    CaseSnapshot:
      type: object
      required: [case_no]
      properties:
        case_no:
          type: string
        uid:
          type: string
        source:
          type: string
        reporter_user_id:
          type: string
        chat_id:
          type: string
        issue_domain:
          type: string
        issue_type:
          type: string
        original_text:
          type: string
        ocr_text:
          type: string
    ToolSpec:
      type: object
      required: [name]
      properties:
        name:
          type: string
        required_scope:
          type: string
        max_time_range_minutes:
          type: integer
        max_limit:
          type: integer
    DecisionRequest:
      type: object
      required: [case]
      properties:
        case:
          $ref: "#/components/schemas/CaseSnapshot"
        entities:
          type: object
          additionalProperties:
            type: string
        available_tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolSpec"
        knowledge_candidates:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeCandidate"
        max_tool_calls:
          type: integer
          default: 10
    KnowledgeCandidate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        confidence:
          type: number
        observed_case_count:
          type: integer
        requires_realtime_check:
          type: boolean
        source:
          type: string
        summary:
          type: string
    ToolPlan:
      type: object
      required: [tool_name, reason, arguments]
      properties:
        tool_name:
          type: string
        reason:
          type: string
        arguments:
          type: object
          additionalProperties: true
    AgentReport:
      type: object
      required: [agent_name, action, reason]
      properties:
        agent_name:
          type: string
        action:
          type: string
        reason:
          type: string
        missing_fields:
          type: array
          items:
            type: string
        tool_plan:
          type: array
          items:
            $ref: "#/components/schemas/ToolPlan"
        knowledge_source:
          type: string
        confidence:
          type: number
        observations:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        evidence:
          type: array
          description: Structured evidence such as local code relative paths, matched terms, and line numbers. It must not contain source snippets.
          items:
            type: object
            additionalProperties: true
    VerificationReport:
      type: object
      required: [accepted, reason]
      properties:
        accepted:
          type: boolean
        reason:
          type: string
        checks:
          type: array
          items:
            type: string
        violations:
          type: array
          items:
            type: string
        tool_budget:
          type: integer
        tool_count:
          type: integer
    DecisionResponse:
      type: object
      required: [action, reason, missing_fields, tool_plan, confidence, agent_reports]
      properties:
        action:
          type: string
          enum: [ask_user, invoke_tools, answer_from_knowledge, local_code_inspection, need_human]
        reason:
          type: string
        missing_fields:
          type: array
          items:
            type: string
        tool_plan:
          type: array
          items:
            $ref: "#/components/schemas/ToolPlan"
        knowledge_source:
          type: string
        confidence:
          type: number
        agent_reports:
          type: array
          items:
            $ref: "#/components/schemas/AgentReport"
        verification:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VerificationReport"
