program: P-2026-018-web-workbench-progress-ui
paths:
  - web/static/index.html
  - internal/webchat/**
  - internal/caseflow/store.go
  - internal/storage/mysql/store.go
  - cmd/dev-server/main.go
  - docs/web-workbench.md
