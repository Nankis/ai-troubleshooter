name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run Go tests
        run: go test ./...

      - name: Run Python tests
        run: PYTHONPATH=apps/decision-engine python -m unittest discover -s apps/decision-engine/tests -p 'test_*.py'
