<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent 问题排查系统</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #151515;
      --rail: #232729;
      --rail-2: #202424;
      --main: #151515;
      --panel: #2a2a2a;
      --panel-2: #202020;
      --line: #373737;
      --line-soft: #2a2a2a;
      --text: #f0f0f0;
      --muted: #a5a5a5;
      --faint: #767676;
      --green: #30d158;
      --green-soft: rgba(48, 209, 88, .12);
      --red: #ff5f57;
      --yellow: #ffbd2e;
      --blue: #66a5ff;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, textarea, input, select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 390px;
      background: var(--main);
      overflow: hidden;
    }

    .left {
      background: linear-gradient(180deg, var(--rail), var(--rail-2));
      border-right: 1px solid var(--line);
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .traffic {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .window-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .window-dot.red { background: var(--red); }
    .window-dot.yellow { background: var(--yellow); }
    .window-dot.green { background: var(--green); }

    .left-actions {
      display: grid;
      gap: 4px;
      padding: 12px 12px 8px;
    }

    .nav-btn {
      min-height: 38px;
      border-radius: var(--radius);
      background: transparent;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      align-items: center;
      text-align: left;
      padding: 0 10px;
      color: #d8d8d8;
    }

    .nav-btn:hover, .nav-btn.active {
      background: rgba(255, 255, 255, .07);
    }

    .nav-ico {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .left-scroll {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 0 12px 18px;
    }

    .section {
      margin: 12px 0 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 4px;
    }

    .section-toggle {
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .section-toggle:hover {
      background: rgba(255, 255, 255, .06);
    }

    .section-head-main {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .section-head-tools {
      gap: 6px;
      padding-right: 0;
    }

    .section-toggle-main {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      min-height: 28px;
      padding: 0 4px;
    }

    .section-caret {
      width: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, .08);
      color: var(--text);
    }

    .icon-btn:disabled {
      cursor: default;
      opacity: .55;
    }

    .icon-btn.spinning {
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .ghost-btn {
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 28px;
      min-width: 28px;
      padding: 0 8px;
    }

    .ghost-btn:hover { background: rgba(255, 255, 255, .08); color: var(--text); }

    .case-list, .tool-list, .knowledge-list, .capability-list {
      display: grid;
      gap: 4px;
    }

    .tool-list[hidden] {
      display: none;
    }

    .case-row, .tool-row, .knowledge-row {
      border-radius: var(--radius);
      padding: 9px 10px;
      color: #d7d7d7;
      background: transparent;
      min-width: 0;
    }

    .case-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      text-align: left;
    }

    .case-row:hover, .case-row.active, .tool-row:hover, .knowledge-row:hover {
      background: rgba(255, 255, 255, .07);
    }

    .case-row.running {
      background: rgba(48, 209, 88, .04);
    }

    .case-row.needs-view .row-title {
      color: #ffffff;
    }

    .case-main {
      appearance: none;
      min-width: 0;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .case-actions {
      display: inline-flex;
      gap: 4px;
      opacity: .78;
    }

    .case-row:hover .case-actions,
    .case-row.active .case-actions {
      opacity: 1;
    }

    .case-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: var(--faint);
      background: transparent;
    }

    .case-action-btn:hover { background: rgba(255, 255, 255, .08); color: var(--text); }
    .case-action-btn.delete:hover { background: rgba(255, 95, 87, .12); color: var(--red); }

    .tool-group {
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, .12);
      overflow: hidden;
    }

    .tool-group-head {
      appearance: none;
      width: 100%;
      min-height: 36px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      color: inherit;
      background: transparent;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .tool-group-head:hover {
      background: rgba(255, 255, 255, .05);
    }

    .tool-service-toggle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      text-align: center;
    }

    .tool-service-name {
      color: #ececec;
      font-weight: 720;
      min-width: 0;
    }

    .tool-group-body {
      display: grid;
      gap: 1px;
      padding: 4px;
    }

    .tool-group.collapsed .tool-group-head {
      border-bottom: 0;
    }

    .tool-group.collapsed .tool-group-body {
      display: none;
    }

    .tool-group .tool-row {
      padding: 8px 8px;
    }

    .tool-row-title {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .tool-name {
      min-width: 0;
    }

    .truncate {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .row-title {
      min-width: 0;
      font-weight: 620;
    }

    .row-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      color: var(--green);
      border-color: rgba(48, 209, 88, .3);
      background: var(--green-soft);
    }

    .tag.red {
      color: var(--red);
      border-color: rgba(255, 95, 87, .35);
      background: rgba(255, 95, 87, .1);
    }

    .tag.yellow {
      color: var(--yellow);
      border-color: rgba(255, 189, 46, .35);
      background: rgba(255, 189, 46, .1);
    }

    .tag.new {
      min-height: 18px;
      padding: 0 6px;
      color: #9be7c6;
      border-color: rgba(155, 231, 198, .34);
      background: rgba(46, 160, 67, .11);
      font-size: 11px;
      font-weight: 700;
    }

    .case-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 24px;
      min-width: 54px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .case-status.running {
      color: #f3f3f3;
      border-color: rgba(48, 209, 88, .28);
      background: rgba(48, 209, 88, .08);
    }

    .case-status.review {
      color: #9be7c6;
      border-color: rgba(155, 231, 198, .34);
      background: rgba(46, 160, 67, .11);
    }

    .case-status.waiting {
      color: var(--yellow);
      border-color: rgba(255, 189, 46, .35);
      background: rgba(255, 189, 46, .08);
    }

    .case-status.done {
      color: var(--green);
      border-color: rgba(48, 209, 88, .3);
      background: var(--green-soft);
    }

    .case-status.failed {
      color: var(--red);
      border-color: rgba(255, 95, 87, .35);
      background: rgba(255, 95, 87, .1);
    }

    .case-status.draft {
      min-width: 44px;
    }

    .status-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, .22);
      border-top-color: #f4f4f4;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(48, 209, 88, .11);
      flex: 0 0 auto;
    }

    .knowledge-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .capability-row {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, .12);
    }

    .capability-row-top {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .capability-meta,
    .capability-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .knowledge-main {
      appearance: none;
      min-width: 0;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .knowledge-main:hover .row-title {
      color: var(--green);
    }

    .knowledge-actions {
      display: inline-flex;
      gap: 4px;
    }

    .action-btn,
    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      color: var(--faint);
    }

    .action-btn:hover { background: rgba(255, 255, 255, .08); color: var(--text); }
    .delete-btn:hover { background: rgba(255, 95, 87, .12); color: var(--red); }

    .knowledge-form,
    .capability-form {
      display: none;
      gap: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, .18);
    }

    .knowledge-form.open { display: grid; }
    .capability-form.open { display: grid; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .input, .mini-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #171717;
      outline: none;
      padding: 9px 10px;
    }

    .mini-textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 140px;
    }

    .input:focus, .mini-textarea:focus, .composer textarea:focus {
      border-color: rgba(48, 209, 88, .65);
      box-shadow: 0 0 0 3px rgba(48, 209, 88, .12);
    }

    .primary-small {
      height: 32px;
      border-radius: 7px;
      padding: 0 12px;
      background: var(--green);
      color: #061006;
      font-weight: 700;
    }

    .primary-small.delete {
      background: var(--red);
      color: #170303;
    }

    .primary-small:disabled,
    .secondary-small:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .secondary-small {
      height: 32px;
      border-radius: 7px;
      padding: 0 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: transparent;
    }

    .secondary-small:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .07);
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 48px minmax(0, 1fr) auto;
      background: var(--main);
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .back {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 19px;
    }

    .back:hover { background: rgba(255, 255, 255, .08); color: var(--text); }

    .title-wrap {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .case-state {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--faint);
    }

    .pulse.on {
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(48, 209, 88, .12);
    }

    .conversation {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      min-width: 0;
      padding: 26px clamp(22px, 7vw, 112px);
    }

    .empty {
      max-width: 820px;
      margin: 7vh auto 0;
      color: var(--muted);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 22px 0;
    }

    .empty-title {
      color: var(--text);
      font-size: 22px;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .msg {
      max-width: 900px;
      margin: 0 auto 22px;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 14px;
    }

    .avatar {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      padding-top: 2px;
    }

    .bubble {
      color: #eeeeee;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.72;
    }

    .msg.user .bubble {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .msg.system .bubble {
      color: var(--muted);
    }

    .msg.agent .avatar { color: var(--green); }

    .decision-strip {
      max-width: 900px;
      margin: 8px auto 24px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .composer-wrap {
      padding: 16px clamp(22px, 7vw, 112px) 20px;
      background: linear-gradient(180deg, rgba(21, 21, 21, 0), var(--main) 22%);
    }

    .composer {
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .composer textarea {
      width: 100%;
      min-height: 86px;
      max-height: 180px;
      resize: vertical;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      padding: 15px 16px 8px;
      line-height: 1.55;
    }

    .image-preview-list {
      display: none;
      gap: 8px;
      padding: 0 10px 8px;
      overflow-x: auto;
    }

    .image-preview-list.has-items {
      display: flex;
    }

    .image-preview {
      position: relative;
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #111;
      overflow: hidden;
    }

    .image-preview-open {
      appearance: none;
      width: 100%;
      height: 100%;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      cursor: zoom-in;
    }

    .image-preview-open:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: -2px;
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 50%;
      color: #fff;
      background: rgba(0, 0, 0, .68);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .image-remove:hover {
      background: rgba(255, 255, 255, .18);
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .image-lightbox[hidden] {
      display: none;
    }

    .image-lightbox-backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(0, 0, 0, .74);
      cursor: zoom-out;
    }

    .image-lightbox-panel {
      position: relative;
      display: grid;
      gap: 8px;
      max-width: min(960px, 90vw);
      max-height: 88vh;
    }

    .image-lightbox-panel img {
      max-width: 100%;
      max-height: calc(88vh - 48px);
      object-fit: contain;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background: #080808;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .55);
    }

    .image-lightbox-footer {
      min-height: 38px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      align-items: center;
      gap: 10px;
      padding: 0 2px;
      color: #e5e5e5;
    }

    .image-lightbox-close {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .image-lightbox-close:hover {
      background: rgba(255, 255, 255, .16);
    }

    .knowledge-modal {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .knowledge-modal[hidden] {
      display: none;
    }

    .case-modal {
      position: fixed;
      inset: 0;
      z-index: 36;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .case-modal[hidden] {
      display: none;
    }

    .case-modal-backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(0, 0, 0, .68);
    }

    .case-modal-panel {
      position: relative;
      width: min(460px, 92vw);
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .knowledge-modal-backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(0, 0, 0, .68);
    }

    .knowledge-modal-panel {
      position: relative;
      width: min(720px, 92vw);
      max-height: 86vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .knowledge-modal-head,
    .knowledge-modal-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
    }

    .knowledge-modal-head {
      border-bottom: 1px solid var(--line);
    }

    .knowledge-modal-actions {
      border-top: 1px solid var(--line);
    }

    .knowledge-modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
    }

    .knowledge-detail {
      display: grid;
      gap: 14px;
      padding: 14px 16px 18px;
      overflow: auto;
    }

    .knowledge-detail-block {
      display: grid;
      gap: 6px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-text {
      color: #e6e6e6;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .detail-list {
      margin: 0;
      padding-left: 20px;
      color: #e6e6e6;
      line-height: 1.55;
    }

    .knowledge-modal-button-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .composer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px 10px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      color: var(--muted);
      border-radius: 7px;
      padding: 0 10px;
      cursor: pointer;
    }

    .file-label:hover { background: rgba(255, 255, 255, .07); color: var(--text); }
    .file-label input { display: none; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--text);
      color: #111;
      font-size: 20px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .send-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .right {
      min-width: 0;
      min-height: 0;
      border-left: 1px solid var(--line);
      padding: 18px 16px;
      background: var(--main);
      overflow: auto;
      overscroll-behavior: contain;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card-title {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .progress-list {
      display: grid;
      gap: 12px;
    }

    .step {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .step-dot {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      border-radius: 50%;
      border: 2px solid var(--faint);
      background: transparent;
    }

    .step.done .step-dot {
      border-color: var(--green);
      background: var(--green);
      box-shadow: inset 0 0 0 4px var(--panel);
    }

    .step.running .step-dot {
      border-color: var(--green);
      box-shadow: 0 0 0 5px rgba(48, 209, 88, .12);
    }

    .step.failed .step-dot { border-color: var(--red); background: var(--red); }
    .step.skipped .step-dot, .step.need_more_info .step-dot { border-color: var(--yellow); }

    .step-title {
      color: #dcdcdc;
      font-weight: 630;
      line-height: 1.35;
    }

    .step-reason {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .side-block {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .kv {
      display: grid;
      gap: 10px;
      color: #d6d6d6;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .kv-ico { color: var(--muted); }
    .kv-value { color: var(--green); font-variant-numeric: tabular-nums; }

    .source-list {
      display: grid;
      gap: 8px;
      color: #d6d6d6;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      max-width: 360px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 300px minmax(0, 1fr); }
      .right { display: none; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .left { display: none; }
      .conversation, .composer-wrap { padding-left: 18px; padding-right: 18px; }
      .msg { grid-template-columns: 1fr; gap: 4px; }
      .avatar { text-align: left; }
      .title-wrap { display: block; }
      .case-state { margin-top: 2px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="traffic" aria-hidden="true">
        <span class="window-dot red"></span>
        <span class="window-dot yellow"></span>
        <span class="window-dot green"></span>
      </div>

      <div class="left-actions">
        <button class="nav-btn" type="button" id="newCase">
          <span class="nav-ico">+</span>
          <span>新对话</span>
        </button>
        <button class="nav-btn" type="button" id="refreshOverview">
          <span class="nav-ico">⌕</span>
          <span>刷新工作台</span>
        </button>
      </div>

      <div class="left-scroll">
        <section class="section">
          <div class="section-head">
            <span>问题</span>
            <span class="tag" id="caseCount">0</span>
          </div>
          <div class="case-list" id="caseList"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <span>能力接入</span>
            <button class="ghost-btn" type="button" id="toggleCapabilityForm">录入</button>
          </div>
          <form class="capability-form" id="capabilityForm">
            <input class="input" name="service_name" placeholder="服务名，可从配置读取">
            <input class="input" name="base_url" placeholder="readonly adapter base URL">
            <input class="input" name="secret_ref" placeholder="token 环境变量名，不填真实密钥">
            <textarea class="mini-textarea" name="raw_config" placeholder="粘贴 Claude/Cursor MCP JSON、MCP routes JSON 或 readonly manifest YAML/JSON"></textarea>
            <div class="form-actions">
              <button class="secondary-small" type="button" id="cancelCapabilityImport">取消</button>
              <button class="primary-small" type="submit" id="capabilitySubmit">导入能力</button>
            </div>
          </form>
          <div class="capability-list" id="capabilityList"></div>
        </section>

        <section class="section">
          <div class="section-head section-head-tools">
            <button class="section-toggle section-toggle-main" type="button" id="toggleToolPanel" aria-expanded="true">
              <span class="section-head-main truncate">
                <span class="section-caret" id="toolPanelCaret">⌄</span>
                <span class="truncate">已注册 Gateway Tools</span>
              </span>
            </button>
            <button class="icon-btn" type="button" id="refreshTools" aria-label="刷新 Gateway Tools" title="刷新 Gateway Tools">↻</button>
            <span class="tag" id="toolCount">0</span>
          </div>
          <div class="tool-list" id="toolList"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <span>平台经验沉淀</span>
            <button class="ghost-btn" type="button" id="toggleKnowledgeForm">录入</button>
          </div>
          <form class="knowledge-form" id="knowledgeForm">
            <input type="hidden" name="id">
            <input class="input" name="title" placeholder="经验标题">
            <input class="input" name="issue_domain" placeholder="领域，例如 health_food">
            <input class="input" name="issue_type" placeholder="类型，例如 每日推荐缺失">
            <textarea class="mini-textarea" name="typical_description" placeholder="典型现象"></textarea>
            <textarea class="mini-textarea" name="recommended_steps" placeholder="排查步骤，每行一条"></textarea>
            <textarea class="mini-textarea" name="common_causes" placeholder="常见原因，每行一条"></textarea>
            <textarea class="mini-textarea" name="useful_tools" placeholder="相关工具，每行一个 tool name"></textarea>
            <div class="form-actions">
              <button class="secondary-small" type="button" id="cancelKnowledgeEdit">取消</button>
              <button class="primary-small" type="submit" id="knowledgeSubmit">保存经验</button>
            </div>
          </form>
          <div class="knowledge-list" id="knowledgeList"></div>
        </section>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="back" type="button" id="backButton" aria-label="返回">‹</button>
        <div class="title-wrap">
          <h1>agent 问题排查系统</h1>
          <div class="case-state">
            <span class="pulse" id="runPulse"></span>
            <span id="runStatus">ready</span>
          </div>
        </div>
      </header>

      <section class="conversation" id="messages">
        <div class="empty">
          <div class="empty-title">等待生产问题</div>
          <div>输入文字或上传截图后，右侧会显示决策层排查步骤、工具调用和当前状态。</div>
        </div>
      </section>

      <div class="composer-wrap">
        <form class="composer" id="chatForm">
          <textarea id="message" name="message" placeholder="描述问题，例如：health-food 用户 123 今日推荐没有生成，时间 2026-05-23 10:00"></textarea>
          <div class="image-preview-list" id="imagePreviewList"></div>
          <div class="composer-bar">
            <label class="file-label">
              <input id="images" name="images" type="file" accept="image/*" multiple>
              <span>＋ 截图</span>
              <span class="tag" id="fileCount">0</span>
            </label>
            <button class="send-btn" type="submit" id="send" aria-label="发送">↑</button>
          </div>
        </form>
      </div>
    </main>

    <aside class="right">
      <div class="status-card">
        <div class="card-title">进度</div>
        <div class="progress-list" id="progressList"></div>

        <div class="side-block">
          <div class="card-title">环境信息</div>
          <div class="kv">
            <div class="kv-row"><span class="kv-ico">◇</span><span>状态</span><span class="kv-value" id="caseStatus">ready</span></div>
            <div class="kv-row"><span class="kv-ico">▣</span><span>工具</span><span class="kv-value" id="envTools">0</span></div>
            <div class="kv-row"><span class="kv-ico">⌘</span><span>知识</span><span class="kv-value" id="envKnowledge">0</span></div>
            <div class="kv-row"><span class="kv-ico">⌁</span><span>来源</span><span class="kv-value" id="caseSource">web</span></div>
          </div>
        </div>

        <div class="side-block">
          <div class="card-title">来源</div>
          <div class="source-list">
            <div>Gateway tools</div>
            <div>平台经验 DB</div>
            <div>Web Chat 输入</div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>
  <div class="image-lightbox" id="imageLightbox" role="dialog" aria-modal="true" aria-label="图片预览" hidden>
    <button class="image-lightbox-backdrop" id="imageLightboxBackdrop" type="button" aria-label="关闭图片预览"></button>
    <div class="image-lightbox-panel">
      <img id="imageLightboxImg" alt="">
      <div class="image-lightbox-footer">
        <span class="truncate" id="imageLightboxName"></span>
        <button class="image-lightbox-close" id="imageLightboxClose" type="button" aria-label="关闭图片预览">×</button>
      </div>
    </div>
  </div>
  <div class="knowledge-modal" id="knowledgeModal" role="dialog" aria-modal="true" aria-label="经验预览" hidden>
    <button class="knowledge-modal-backdrop" id="knowledgeModalBackdrop" type="button" aria-label="关闭经验预览"></button>
    <section class="knowledge-modal-panel">
      <div class="knowledge-modal-head">
        <span class="row-title truncate" id="knowledgeModalTitle"></span>
        <button class="image-lightbox-close" id="knowledgeModalClose" type="button" aria-label="关闭经验预览">×</button>
      </div>
      <div class="knowledge-modal-meta" id="knowledgeModalMeta"></div>
      <div class="knowledge-detail" id="knowledgeModalBody"></div>
      <div class="knowledge-modal-actions">
        <span class="row-meta" id="knowledgeModalStats"></span>
        <span class="knowledge-modal-button-row">
          <button class="secondary-small" type="button" id="knowledgeModalEdit">编辑</button>
          <button class="secondary-small" type="button" id="knowledgeModalDelete">删除</button>
        </span>
      </div>
    </section>
  </div>
  <div class="case-modal" id="caseModal" role="dialog" aria-modal="true" aria-label="问题会话操作" hidden>
    <button class="case-modal-backdrop" id="caseModalBackdrop" type="button" aria-label="关闭"></button>
    <section class="case-modal-panel">
      <div>
        <div class="row-title" id="caseModalTitle"></div>
        <div class="row-meta" id="caseModalDesc"></div>
      </div>
      <input class="input" id="caseModalInput" placeholder="问题标题">
      <div class="form-actions">
        <button class="secondary-small" type="button" id="caseModalCancel">取消</button>
        <button class="primary-small" type="button" id="caseModalConfirm">确认</button>
      </div>
    </section>
  </div>

  <script>
    const DRAFT_STORAGE_KEY = "ai-troubleshooter.web.drafts.v1";
    const CASE_READ_STORAGE_KEY = "ai-troubleshooter.web.caseReads.v1";

    const state = {
      currentCaseNo: "",
      currentDraftID: "",
      polling: null,
      tools: [],
      capabilities: [],
      knowledge: [],
      cases: [],
      drafts: [],
      processing: false,
      collapsedToolServices: new Set(),
      toolPanelCollapsed: false,
      toolsLoadedOnce: false,
      newToolNames: new Set(),
      toolRefreshing: false,
      draftSeq: 0,
      caseReads: loadCaseReads(),
      caseSeen: {},
      overviewLoadedOnce: false,
      appStartedAt: Date.now(),
      imagePreviewUrls: [],
      activeImagePreviewIndex: -1,
      activeKnowledgeId: 0,
      editingKnowledgeId: 0,
      caseModal: { mode: "", targetType: "", targetID: "" },
    };

    const el = {
      form: document.getElementById("chatForm"),
      send: document.getElementById("send"),
      status: document.getElementById("runStatus"),
      pulse: document.getElementById("runPulse"),
      messages: document.getElementById("messages"),
      message: document.getElementById("message"),
      images: document.getElementById("images"),
      imagePreviewList: document.getElementById("imagePreviewList"),
      fileCount: document.getElementById("fileCount"),
      caseList: document.getElementById("caseList"),
      caseCount: document.getElementById("caseCount"),
      toolList: document.getElementById("toolList"),
      toolCount: document.getElementById("toolCount"),
      toolPanelCaret: document.getElementById("toolPanelCaret"),
      toggleToolPanel: document.getElementById("toggleToolPanel"),
      refreshTools: document.getElementById("refreshTools"),
      capabilityList: document.getElementById("capabilityList"),
      capabilityForm: document.getElementById("capabilityForm"),
      capabilitySubmit: document.getElementById("capabilitySubmit"),
      cancelCapabilityImport: document.getElementById("cancelCapabilityImport"),
      knowledgeList: document.getElementById("knowledgeList"),
      knowledgeForm: document.getElementById("knowledgeForm"),
      knowledgeSubmit: document.getElementById("knowledgeSubmit"),
      cancelKnowledgeEdit: document.getElementById("cancelKnowledgeEdit"),
      progressList: document.getElementById("progressList"),
      caseStatus: document.getElementById("caseStatus"),
      envTools: document.getElementById("envTools"),
      envKnowledge: document.getElementById("envKnowledge"),
      caseSource: document.getElementById("caseSource"),
      toast: document.getElementById("toast"),
      imageLightbox: document.getElementById("imageLightbox"),
      imageLightboxImg: document.getElementById("imageLightboxImg"),
      imageLightboxName: document.getElementById("imageLightboxName"),
      imageLightboxBackdrop: document.getElementById("imageLightboxBackdrop"),
      imageLightboxClose: document.getElementById("imageLightboxClose"),
      knowledgeModal: document.getElementById("knowledgeModal"),
      knowledgeModalTitle: document.getElementById("knowledgeModalTitle"),
      knowledgeModalMeta: document.getElementById("knowledgeModalMeta"),
      knowledgeModalBody: document.getElementById("knowledgeModalBody"),
      knowledgeModalStats: document.getElementById("knowledgeModalStats"),
      knowledgeModalBackdrop: document.getElementById("knowledgeModalBackdrop"),
      knowledgeModalClose: document.getElementById("knowledgeModalClose"),
      knowledgeModalEdit: document.getElementById("knowledgeModalEdit"),
      knowledgeModalDelete: document.getElementById("knowledgeModalDelete"),
      caseModal: document.getElementById("caseModal"),
      caseModalTitle: document.getElementById("caseModalTitle"),
      caseModalDesc: document.getElementById("caseModalDesc"),
      caseModalInput: document.getElementById("caseModalInput"),
      caseModalBackdrop: document.getElementById("caseModalBackdrop"),
      caseModalCancel: document.getElementById("caseModalCancel"),
      caseModalConfirm: document.getElementById("caseModalConfirm"),
    };

    document.getElementById("newCase").addEventListener("click", createDraftCase);
    document.getElementById("refreshOverview").addEventListener("click", () => loadOverview());
    el.toggleToolPanel.addEventListener("click", toggleToolPanel);
    el.refreshTools.addEventListener("click", refreshTools);
    document.getElementById("backButton").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    document.getElementById("toggleCapabilityForm").addEventListener("click", toggleCapabilityForm);
    el.cancelCapabilityImport.addEventListener("click", () => {
      el.capabilityForm.reset();
      el.capabilityForm.classList.remove("open");
    });
    document.getElementById("toggleKnowledgeForm").addEventListener("click", toggleKnowledgeForm);
    el.cancelKnowledgeEdit.addEventListener("click", () => {
      resetKnowledgeForm();
      el.knowledgeForm.classList.remove("open");
    });

    el.images.addEventListener("change", updateImages);
    el.message.addEventListener("input", updateActiveDraftFromComposer);
    el.form.addEventListener("paste", handleComposerPaste);
    el.imageLightboxBackdrop.addEventListener("click", closeImagePreview);
    el.imageLightboxClose.addEventListener("click", closeImagePreview);
    el.knowledgeModalBackdrop.addEventListener("click", closeKnowledgePreview);
    el.knowledgeModalClose.addEventListener("click", closeKnowledgePreview);
    el.knowledgeModalEdit.addEventListener("click", () => editKnowledge(state.activeKnowledgeId));
    el.knowledgeModalDelete.addEventListener("click", () => deleteKnowledge(state.activeKnowledgeId));
    el.caseModalBackdrop.addEventListener("click", closeCaseModal);
    el.caseModalCancel.addEventListener("click", closeCaseModal);
    el.caseModalConfirm.addEventListener("click", confirmCaseModal);
    el.caseModalInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") confirmCaseModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (!el.caseModal.hidden) {
        closeCaseModal();
        return;
      }
      if (!el.imageLightbox.hidden) {
        closeImagePreview();
        return;
      }
      if (!el.knowledgeModal.hidden) closeKnowledgePreview();
    });
    window.addEventListener("beforeunload", revokeImagePreviewUrls);

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = el.message.value.trim();
      if (!text && el.images.files.length === 0) return;
      updateActiveDraftFromComposer();

      const data = new FormData();
      data.append("message", text);
      data.append("async", "1");
      if (state.currentCaseNo) data.append("case_no", state.currentCaseNo);
      if (!state.currentCaseNo) data.append("title", activeDraftTitle(text));
      for (const file of el.images.files) data.append("images", file);

      setBusy(true);
      try {
        const response = await fetch("/web/api/chat", { method: "POST", body: data });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "request failed");
        if (state.currentDraftID) removeDraft(state.currentDraftID);
        state.currentDraftID = "";
        state.currentCaseNo = payload.case.case_no;
        applyCasePayload(payload);
        startPolling(state.currentCaseNo);
        el.message.value = "";
        clearImages();
        await loadOverview();
      } catch (error) {
        showToast("请求失败：" + error.message);
        setBusy(false);
      }
    });

    el.capabilityForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(el.capabilityForm);
      const payload = {
        service_name: data.get("service_name"),
        base_url: data.get("base_url"),
        secret_ref: data.get("secret_ref"),
        raw_config: data.get("raw_config"),
      };
      try {
        el.capabilitySubmit.disabled = true;
        const response = await fetch("/web/api/capabilities/import", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const imported = await response.json();
        if (!response.ok) throw new Error(imported.error || "import failed");
        el.capabilityForm.reset();
        el.capabilityForm.classList.remove("open");
        showToast(importSummary(imported));
        await loadOverview();
      } catch (error) {
        showToast("导入失败：" + error.message);
      } finally {
        el.capabilitySubmit.disabled = false;
      }
    });

    el.knowledgeForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(el.knowledgeForm);
      const id = String(data.get("id") || "").trim();
      const payload = {
        title: data.get("title"),
        issue_domain: data.get("issue_domain"),
        issue_type: data.get("issue_type"),
        typical_description: data.get("typical_description"),
        recommended_steps: lines(data.get("recommended_steps")),
        common_causes: lines(data.get("common_causes")),
        useful_tools: lines(data.get("useful_tools")),
      };
      const url = id ? "/web/api/knowledge/" + encodeURIComponent(id) : "/web/api/knowledge";
      const method = id ? "PUT" : "POST";
      try {
        const response = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const saved = await response.json();
        if (!response.ok) throw new Error(saved.error || "save failed");
        resetKnowledgeForm();
        el.knowledgeForm.classList.remove("open");
        showToast(id ? "经验已更新" : "经验已保存");
        await loadOverview();
      } catch (error) {
        showToast("保存失败：" + error.message);
      }
    });

    async function loadOverview(options = {}) {
      const previousToolNames = new Set(state.tools.map(toolKey).filter(Boolean));
      const response = await fetch("/web/api/overview");
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "overview failed");
      const nextTools = payload.tools || [];
      const nextToolNames = new Set(nextTools.map(toolKey).filter(Boolean));
      const addedToolNames = state.toolsLoadedOnce
        ? nextTools.map(toolKey).filter((name) => name && !previousToolNames.has(name))
        : [];
      const newToolNames = new Set([...state.newToolNames].filter((name) => nextToolNames.has(name)));
      addedToolNames.forEach((name) => newToolNames.add(name));
      state.newToolNames = newToolNames;
      state.toolsLoadedOnce = true;
      state.tools = nextTools;
      state.capabilities = payload.capabilities || [];
      state.knowledge = payload.knowledge || [];
      state.cases = payload.cases || [];
      syncCaseReadState(state.cases);
      renderCases();
      renderCapabilities();
      renderTools();
      renderToolPanel();
      renderKnowledge();
      el.envTools.textContent = String(state.tools.length);
      el.envKnowledge.textContent = String(state.knowledge.length);
      if (options.toolFeedback) {
        showToast(addedToolNames.length ? `Gateway Tools 已更新：新增 ${addedToolNames.length} 个` : "Gateway Tools 已是最新");
      }
      return { addedToolNames };
    }

    async function refreshTools() {
      if (state.toolRefreshing) return;
      state.toolRefreshing = true;
      el.refreshTools.disabled = true;
      el.refreshTools.classList.add("spinning");
      try {
        await loadOverview({ toolFeedback: true });
      } catch (error) {
        showToast("刷新工具失败：" + error.message);
      } finally {
        state.toolRefreshing = false;
        el.refreshTools.disabled = false;
        el.refreshTools.classList.remove("spinning");
      }
    }

    function toggleCapabilityForm() {
      el.capabilityForm.classList.toggle("open");
      if (el.capabilityForm.classList.contains("open")) {
        el.capabilityForm.elements.raw_config.focus();
      }
    }

    function importSummary(imported) {
      const capabilityCount = (imported.capabilities || []).length;
      const serverCount = (imported.mcp_servers || []).length;
      if (capabilityCount > 0) return "已导入 " + String(capabilityCount) + " 个能力";
      if (serverCount > 0) return "已记录 " + String(serverCount) + " 个 MCP server，需补充 readonly routes 后发布";
      return "配置已导入，暂无可发布能力";
    }

    function renderCapabilities() {
      if (!state.capabilities.length) {
        el.capabilityList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无动态能力</div>`;
        return;
      }
      el.capabilityList.innerHTML = state.capabilities.map((item) => {
        const enabled = item.tool_status === "enabled";
        const rejected = item.tool_status === "rejected" || item.safety_status === "rejected";
        const publishable = !enabled && !rejected && item.safety_status === "readonly_candidate";
        return `
          <div class="capability-row">
            <div class="capability-row-top">
              <span class="truncate">
                <span class="row-title truncate">${escapeHTML(item.tool_name || "-")}</span>
                <span class="row-meta truncate">${escapeHTML([item.service_name, item.source_type].filter(Boolean).join(" · "))}</span>
              </span>
              <span class="tag ${statusTagClass(item.tool_status)}">${escapeHTML(capabilityStatusText(item.tool_status))}</span>
            </div>
            <div class="capability-meta">
              <span class="tag ${safetyTagClass(item.safety_status)}">${escapeHTML(safetyStatusText(item.safety_status))}</span>
              <span class="tag">${escapeHTML(item.required_scope || "dynamic:read")}</span>
            </div>
            <div class="row-meta truncate">${escapeHTML(item.readonly_path || item.description || "")}</div>
            <div class="capability-actions">
              <button class="secondary-small" type="button" data-capability-publish="${escapeAttr(item.id)}" ${publishable ? "" : "disabled"}>发布</button>
              <button class="secondary-small" type="button" data-capability-disable="${escapeAttr(item.id)}" ${enabled ? "" : "disabled"}>停用</button>
            </div>
          </div>
        `;
      }).join("");
      el.capabilityList.querySelectorAll("[data-capability-publish]").forEach((button) => {
        button.addEventListener("click", () => publishCapability(button.dataset.capabilityPublish));
      });
      el.capabilityList.querySelectorAll("[data-capability-disable]").forEach((button) => {
        button.addEventListener("click", () => disableCapability(button.dataset.capabilityDisable));
      });
    }

    async function publishCapability(id) {
      if (!id) return;
      try {
        const response = await fetch("/web/api/capabilities/" + encodeURIComponent(id) + "/publish", { method: "POST" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "publish failed");
        showToast("能力已发布到 Gateway");
        await loadOverview({ toolFeedback: true });
      } catch (error) {
        showToast("发布失败：" + error.message);
      }
    }

    async function disableCapability(id) {
      if (!id) return;
      try {
        const response = await fetch("/web/api/capabilities/" + encodeURIComponent(id) + "/disable", { method: "POST" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "disable failed");
        showToast("能力已停用");
        await loadOverview();
      } catch (error) {
        showToast("停用失败：" + error.message);
      }
    }

    function createDraftCase() {
      updateActiveDraftFromComposer();
      const draftID = "draft_" + Date.now() + "_" + (++state.draftSeq);
      state.drafts.unshift({
        draft_id: draftID,
        title: "新问题",
        message: "",
        manual_title: false,
        created_at: new Date().toISOString(),
      });
      saveDrafts();
      selectDraftCase(draftID);
      renderCases();
      showToast("已新建问题草稿");
    }

    function selectDraftCase(draftID) {
      updateActiveDraftFromComposer();
      const draft = state.drafts.find((item) => item.draft_id === draftID);
      if (!draft) return;
      stopPolling();
      state.currentDraftID = draftID;
      state.currentCaseNo = "";
      setBusy(false);
      el.message.value = draft.message || "";
      clearImages();
      renderEmpty();
      renderProgress([]);
      el.caseStatus.textContent = "ready";
      el.caseSource.textContent = "web";
      highlightCurrentCase();
      el.message.focus();
    }

    function updateActiveDraftFromComposer() {
      if (!state.currentDraftID) return;
      const draft = state.drafts.find((item) => item.draft_id === state.currentDraftID);
      if (!draft) return;
      draft.message = el.message.value;
      if (!draft.manual_title) draft.title = draftTitle(el.message.value);
      saveDrafts();
      renderCases();
    }

    function removeDraft(draftID) {
      state.drafts = state.drafts.filter((item) => item.draft_id !== draftID);
      saveDrafts();
    }

    function loadDrafts() {
      try {
        const raw = window.localStorage.getItem(DRAFT_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        state.drafts = Array.isArray(parsed)
          ? parsed.filter((item) => item && item.draft_id).slice(0, 30)
          : [];
        state.draftSeq = state.drafts.length;
      } catch (_) {
        state.drafts = [];
      }
    }

    function saveDrafts() {
      try {
        const compact = state.drafts.slice(0, 30).map((item) => ({
          draft_id: item.draft_id,
          title: item.title || "新问题",
          message: item.message || "",
          manual_title: Boolean(item.manual_title),
          created_at: item.created_at || new Date().toISOString(),
        }));
        window.localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(compact));
      } catch (_) {
        showToast("草稿本地保存失败");
      }
    }

    function activeDraftTitle(text) {
      const draft = state.drafts.find((item) => item.draft_id === state.currentDraftID);
      if (!draft) return draftTitle(text);
      return caseTitle({ title: draft.title, original_text: text }) || draftTitle(text);
    }

    function renameDraft(draftID) {
      const draft = state.drafts.find((item) => item.draft_id === draftID);
      if (!draft) return;
      openCaseModal("rename", "draft", draftID, caseTitle(draft));
    }

    async function renameCase(caseNo) {
      const item = state.cases.find((entry) => entry.case_no === caseNo);
      if (!item) return;
      openCaseModal("rename", "case", caseNo, caseTitle(item));
    }

    async function applyCaseRename(targetType, targetID, title) {
      if (targetType === "draft") {
        const draft = state.drafts.find((item) => item.draft_id === targetID);
        if (!draft) return;
        draft.title = title;
        draft.manual_title = true;
        saveDrafts();
        renderCases();
        showToast("草稿已重命名");
        return;
      }
      try {
        const response = await fetch("/web/api/cases/" + encodeURIComponent(targetID), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "rename failed");
        const item = state.cases.find((entry) => entry.case_no === targetID);
        if (!item) return;
        Object.assign(item, payload);
        item.title = payload.title || title;
        markCaseViewed(item);
        renderCases();
        showToast("问题已重命名");
      } catch (error) {
        showToast("重命名失败：" + error.message);
      }
    }

    function deleteDraft(draftID) {
      const draft = state.drafts.find((item) => item.draft_id === draftID);
      if (!draft) return;
      openCaseModal("delete", "draft", draftID, caseTitle(draft));
    }

    async function deleteCase(caseNo) {
      const item = state.cases.find((entry) => entry.case_no === caseNo);
      if (!item) return;
      openCaseModal("delete", "case", caseNo, caseTitle(item));
    }

    async function applyCaseDelete(targetType, targetID) {
      if (targetType === "draft") {
        removeDraft(targetID);
        if (state.currentDraftID === targetID) {
          state.currentDraftID = "";
          el.message.value = "";
          clearImages();
          renderEmpty();
          renderProgress([]);
          setBusy(false);
        }
        renderCases();
        showToast("草稿已删除");
        return;
      }
      try {
        const response = await fetch("/web/api/cases/" + encodeURIComponent(targetID), { method: "DELETE" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "delete failed");
        state.cases = state.cases.filter((entry) => entry.case_no !== targetID);
        if (state.currentCaseNo === targetID) {
          stopPolling();
          state.currentCaseNo = "";
          renderEmpty();
          renderProgress([]);
          setBusy(false);
          el.caseStatus.textContent = "ready";
        }
        renderCases();
        showToast("问题会话已删除");
      } catch (error) {
        showToast("删除失败：" + error.message);
      }
    }

    function openCaseModal(mode, targetType, targetID, title) {
      state.caseModal = { mode, targetType, targetID };
      const isDelete = mode === "delete";
      el.caseModalTitle.textContent = isDelete ? "删除问题会话" : "重命名问题";
      el.caseModalDesc.textContent = isDelete ? title : "修改左侧列表显示标题，不会改变原始问题内容。";
      el.caseModalInput.hidden = isDelete;
      el.caseModalInput.value = isDelete ? "" : title;
      el.caseModalConfirm.textContent = isDelete ? "删除" : "保存";
      el.caseModalConfirm.classList.toggle("delete", isDelete);
      el.caseModal.hidden = false;
      if (isDelete) {
        el.caseModalConfirm.focus();
      } else {
        el.caseModalInput.focus();
        el.caseModalInput.select();
      }
    }

    function closeCaseModal() {
      if (el.caseModal.hidden) return;
      state.caseModal = { mode: "", targetType: "", targetID: "" };
      el.caseModal.hidden = true;
      el.caseModalInput.value = "";
    }

    async function confirmCaseModal() {
      const { mode, targetType, targetID } = state.caseModal;
      if (!mode || !targetType || !targetID) return;
      if (mode === "rename") {
        const title = compactTitle(el.caseModalInput.value);
        if (!title) return showToast("标题不能为空");
        await applyCaseRename(targetType, targetID, title);
      } else if (mode === "delete") {
        await applyCaseDelete(targetType, targetID);
      }
      closeCaseModal();
    }

    function handleComposerPaste(event) {
      const files = imageFilesFromClipboard(event.clipboardData);
      if (files.length === 0) return;
      if (!appendImageFiles(files)) return;
      event.preventDefault();
      showToast(files.length === 1 ? "已粘贴 1 张截图" : "已粘贴 " + files.length + " 张截图");
    }

    function imageFilesFromClipboard(clipboardData) {
      if (!clipboardData || !clipboardData.items) return [];
      const files = [];
      for (const item of clipboardData.items) {
        if (item.kind !== "file" || !item.type.startsWith("image/")) continue;
        const blob = item.getAsFile();
        if (!blob) continue;
        files.push(toNamedImageFile(blob, files.length));
      }
      return files;
    }

    function toNamedImageFile(blob, index) {
      const type = blob.type || "image/png";
      const name = "pasted-" + compactTimestamp() + "-" + String(index + 1) + "." + imageExtension(type);
      if (typeof File === "function") {
        return new File([blob], name, { type, lastModified: Date.now() });
      }
      return blob;
    }

    function appendImageFiles(files) {
      if (files.length === 0) return false;
      if (typeof DataTransfer !== "function") {
        showToast("当前浏览器不支持粘贴图片");
        return false;
      }
      const transfer = new DataTransfer();
      for (const file of el.images.files) transfer.items.add(file);
      for (const file of files) transfer.items.add(file);
      el.images.files = transfer.files;
      updateImages();
      return true;
    }

    function removeImageAt(index) {
      if (typeof DataTransfer !== "function") {
        showToast("当前浏览器不支持移除图片");
        return;
      }
      const transfer = new DataTransfer();
      Array.from(el.images.files || []).forEach((file, itemIndex) => {
        if (itemIndex !== index) transfer.items.add(file);
      });
      el.images.files = transfer.files;
      updateImages();
    }

    function updateImages() {
      closeImagePreview();
      updateFileCount();
      renderImagePreviews();
    }

    function updateFileCount() {
      el.fileCount.textContent = String(el.images.files.length);
    }

    function clearImages() {
      el.images.value = "";
      updateImages();
    }

    function revokeImagePreviewUrls() {
      for (const url of state.imagePreviewUrls) URL.revokeObjectURL(url);
      state.imagePreviewUrls = [];
    }

    function renderImagePreviews() {
      revokeImagePreviewUrls();
      const files = Array.from(el.images.files || []);
      el.imagePreviewList.classList.toggle("has-items", files.length > 0);
      if (!files.length) {
        el.imagePreviewList.innerHTML = "";
        return;
      }
      el.imagePreviewList.innerHTML = files.map((file, index) => {
        const url = URL.createObjectURL(file);
        state.imagePreviewUrls.push(url);
        return `
          <div class="image-preview">
            <button class="image-preview-open" type="button" data-preview-index="${index}" aria-label="预览截图">
              <img src="${escapeAttr(url)}" alt="${escapeAttr(file.name || "screenshot")}">
            </button>
            <button class="image-remove" type="button" data-image-index="${index}" aria-label="移除截图">×</button>
          </div>
        `;
      }).join("");
      el.imagePreviewList.querySelectorAll("[data-preview-index]").forEach((button) => {
        button.addEventListener("click", () => openImagePreview(Number(button.dataset.previewIndex)));
      });
      el.imagePreviewList.querySelectorAll("[data-image-index]").forEach((button) => {
        button.addEventListener("click", () => removeImageAt(Number(button.dataset.imageIndex)));
      });
    }

    function openImagePreview(index) {
      const url = state.imagePreviewUrls[index];
      const file = Array.from(el.images.files || [])[index];
      if (!url || !file) return;
      state.activeImagePreviewIndex = index;
      el.imageLightboxImg.src = url;
      el.imageLightboxImg.alt = file.name || "screenshot";
      el.imageLightboxName.textContent = file.name || "screenshot";
      el.imageLightbox.hidden = false;
      el.imageLightboxClose.focus();
    }

    function closeImagePreview() {
      if (el.imageLightbox.hidden) return;
      state.activeImagePreviewIndex = -1;
      el.imageLightbox.hidden = true;
      el.imageLightboxImg.removeAttribute("src");
      el.imageLightboxImg.alt = "";
      el.imageLightboxName.textContent = "";
    }

    function imageExtension(type) {
      if (type === "image/jpeg") return "jpg";
      if (type === "image/webp") return "webp";
      if (type === "image/gif") return "gif";
      return "png";
    }

    function compactTimestamp() {
      return new Date().toISOString().replace(/[-:.TZ]/g, "").slice(0, 14);
    }

    function startPolling(caseNo) {
      stopPolling();
      pollCase(caseNo);
      state.polling = window.setInterval(() => pollCase(caseNo), 1200);
    }

    function stopPolling() {
      if (state.polling) window.clearInterval(state.polling);
      state.polling = null;
    }

    async function pollCase(caseNo) {
      try {
        const response = await fetch("/web/api/cases/" + encodeURIComponent(caseNo));
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "case status failed");
        applyCasePayload(payload);
        if (!payload.processing) {
          stopPolling();
          setBusy(false);
          await loadOverview();
        }
      } catch (error) {
        stopPolling();
        setBusy(false);
        showToast("状态刷新失败：" + error.message);
      }
    }

    function applyCasePayload(payload) {
      const c = payload.case || {};
      state.currentCaseNo = c.case_no || state.currentCaseNo;
      mergeCaseIntoList(c);
      markCaseViewed(c);
      renderMessages(payload.messages || []);
      renderProgress(payload.progress || []);
      renderDecisionStrip(payload.ai_decision_logs || []);
      setBusy(Boolean(payload.processing));
      el.caseStatus.textContent = c.status || "ready";
      el.caseSource.textContent = c.source || "web";
      renderCases();
    }

    function renderCases() {
      const items = [
        ...state.drafts.map((item) => ({ ...item, isDraft: true })),
        ...state.cases.map((item) => ({ ...item, isDraft: false })),
      ];
      el.caseCount.textContent = String(items.length);
      if (!items.length) {
        el.caseList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无问题会话</div>`;
        return;
      }
      el.caseList.innerHTML = items.map((item) => `
        <div class="${escapeAttr(caseRowClasses(item))}">
          <button class="case-main truncate" type="button" ${item.isDraft ? `data-draft-open="${escapeAttr(item.draft_id)}"` : `data-case-open="${escapeAttr(item.case_no)}"`}>
            <span class="row-title truncate">${escapeHTML(caseTitle(item))}</span>
            <span class="row-meta truncate">${escapeHTML(item.isDraft ? "草稿 · web" : (item.issue_domain || item.source || "web"))}</span>
          </button>
          ${caseStatusHTML(item)}
          <span class="case-actions">
            <button class="case-action-btn" type="button" ${item.isDraft ? `data-draft-rename="${escapeAttr(item.draft_id)}"` : `data-case-rename="${escapeAttr(item.case_no)}"`} aria-label="重命名问题" title="重命名">✎</button>
            <button class="case-action-btn delete" type="button" ${item.isDraft ? `data-draft-delete="${escapeAttr(item.draft_id)}"` : `data-case-delete="${escapeAttr(item.case_no)}"`} aria-label="删除问题" title="删除">×</button>
          </span>
        </div>
      `).join("");
      el.caseList.querySelectorAll("[data-case-open]").forEach((button) => {
        button.addEventListener("click", () => {
          updateActiveDraftFromComposer();
          const caseNo = button.dataset.caseOpen || "";
          const item = state.cases.find((entry) => entry.case_no === caseNo);
          if (item) markCaseViewed(item);
          state.currentDraftID = "";
          state.currentCaseNo = caseNo;
          renderCases();
          startPolling(state.currentCaseNo);
        });
      });
      el.caseList.querySelectorAll("[data-draft-open]").forEach((button) => {
        button.addEventListener("click", () => selectDraftCase(button.dataset.draftOpen || ""));
      });
      el.caseList.querySelectorAll("[data-draft-rename]").forEach((button) => {
        button.addEventListener("click", () => renameDraft(button.dataset.draftRename || ""));
      });
      el.caseList.querySelectorAll("[data-case-rename]").forEach((button) => {
        button.addEventListener("click", () => renameCase(button.dataset.caseRename || ""));
      });
      el.caseList.querySelectorAll("[data-draft-delete]").forEach((button) => {
        button.addEventListener("click", () => deleteDraft(button.dataset.draftDelete || ""));
      });
      el.caseList.querySelectorAll("[data-case-delete]").forEach((button) => {
        button.addEventListener("click", () => deleteCase(button.dataset.caseDelete || ""));
      });
    }

    function renderTools() {
      el.toolCount.textContent = String(state.tools.length);
      if (!state.tools.length) {
        el.toolList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无工具</div>`;
        return;
      }
      el.toolList.innerHTML = groupToolsByService(state.tools).map((group) => {
        const collapsed = state.collapsedToolServices.has(group.service);
        const newCount = group.tools.filter((item) => state.newToolNames.has(toolKey(item))).length;
        return `
        <div class="tool-group ${collapsed ? "collapsed" : ""}">
          <button class="tool-group-head" type="button" data-tool-service="${escapeAttr(group.service)}" aria-expanded="${String(!collapsed)}">
            <span class="tool-service-toggle">${collapsed ? "›" : "⌄"}</span>
            <span class="tool-service-name truncate">${escapeHTML(group.service)}</span>
            ${newCount ? `<span class="tag new">+${newCount}</span>` : ""}
            <span class="tag">${group.tools.length}</span>
          </button>
          <div class="tool-group-body">
            ${group.tools.map((item) => `
              <div class="tool-row">
                <div class="row-title tool-row-title">
                  <span class="tool-name truncate">${escapeHTML(item.name)}</span>
                  ${state.newToolNames.has(toolKey(item)) ? `<span class="tag new">新增</span>` : ""}
                </div>
                <div class="row-meta">${escapeHTML(item.description || item.required_scope || "")}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
      }).join("");
      el.toolList.querySelectorAll("[data-tool-service]").forEach((button) => {
        button.addEventListener("click", () => {
          const service = button.dataset.toolService || "";
          if (state.collapsedToolServices.has(service)) {
            state.collapsedToolServices.delete(service);
          } else {
            state.collapsedToolServices.add(service);
          }
          renderTools();
        });
      });
    }

    function toggleToolPanel() {
      state.toolPanelCollapsed = !state.toolPanelCollapsed;
      renderToolPanel();
    }

    function renderToolPanel() {
      el.toolList.hidden = state.toolPanelCollapsed;
      el.toggleToolPanel.setAttribute("aria-expanded", String(!state.toolPanelCollapsed));
      el.toolPanelCaret.textContent = state.toolPanelCollapsed ? "›" : "⌄";
    }

    function groupToolsByService(tools) {
      const groups = new Map();
      for (const tool of tools) {
        const service = toolService(tool);
        if (!groups.has(service)) groups.set(service, []);
        groups.get(service).push(tool);
      }
      return Array.from(groups.entries())
        .map(([service, items]) => ({
          service,
          tools: items.slice().sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""))),
        }))
        .sort((a, b) => serviceRank(a.service) - serviceRank(b.service) || a.service.localeCompare(b.service));
    }

    function toolService(tool) {
      const handler = String(tool.backend_handler || "");
      const scope = String(tool.required_scope || "");
      const name = String(tool.name || "");
      const signal = [handler, scope, name].join(" ").toLowerCase();
      if (signal.includes("health_food") || signal.includes("health-food")) return "health-food";
      if (signal.includes("asset_connector") || signal.includes("asset:") || name.startsWith("get_asset_")) return "asset-service";
      if (signal.includes("market_connector") || signal.includes("external_exchange") || signal.includes("redis_readonly") || signal.includes("kline") || signal.includes("cache:read")) return "market-service";
      if (signal.includes("log_connector") || signal.includes("deploy_connector") || signal.includes("logs:") || signal.includes("deploy:")) return "ops/logs";
      if (signal.includes("case_repository") || signal.includes("similar_case")) return "platform";
      return "other";
    }

    function toolKey(tool) {
      return String(tool && tool.name || "").trim();
    }

    function serviceRank(service) {
      const order = ["health-food", "asset-service", "market-service", "ops/logs", "platform", "other"];
      const index = order.indexOf(service);
      return index === -1 ? order.length : index;
    }

    function toggleKnowledgeForm() {
      if (state.editingKnowledgeId) {
        resetKnowledgeForm();
        el.knowledgeForm.classList.add("open");
        el.knowledgeForm.elements.title.focus();
        return;
      }
      if (!el.knowledgeForm.classList.contains("open")) {
        resetKnowledgeForm();
        el.knowledgeForm.classList.add("open");
        el.knowledgeForm.elements.title.focus();
        return;
      }
      resetKnowledgeForm();
      el.knowledgeForm.classList.remove("open");
    }

    function resetKnowledgeForm() {
      state.editingKnowledgeId = 0;
      el.knowledgeForm.reset();
      el.knowledgeForm.elements.id.value = "";
      el.knowledgeSubmit.textContent = "保存经验";
      document.getElementById("toggleKnowledgeForm").textContent = "录入";
    }

    function renderKnowledge() {
      if (!state.knowledge.length) {
        el.knowledgeList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无沉淀经验</div>`;
        return;
      }
      el.knowledgeList.innerHTML = state.knowledge.map((item) => `
        <div class="knowledge-row">
          <button class="knowledge-main truncate" type="button" data-knowledge-preview-id="${escapeAttr(item.id)}">
            <span class="row-title truncate">${escapeHTML(item.title)}</span>
            <span class="row-meta truncate">${escapeHTML([item.issue_domain, item.issue_type].filter(Boolean).join(" · "))}</span>
          </button>
          <span class="knowledge-actions">
            <button class="action-btn" type="button" data-knowledge-edit-id="${escapeAttr(item.id)}" aria-label="编辑经验">✎</button>
            <button class="delete-btn" type="button" data-knowledge-id="${escapeAttr(item.id)}" aria-label="删除经验">×</button>
          </span>
        </div>
      `).join("");
      el.knowledgeList.querySelectorAll("[data-knowledge-preview-id]").forEach((button) => {
        button.addEventListener("click", () => openKnowledgePreview(button.dataset.knowledgePreviewId));
      });
      el.knowledgeList.querySelectorAll("[data-knowledge-edit-id]").forEach((button) => {
        button.addEventListener("click", () => editKnowledge(button.dataset.knowledgeEditId));
      });
      el.knowledgeList.querySelectorAll("[data-knowledge-id]").forEach((button) => {
        button.addEventListener("click", () => deleteKnowledge(button.dataset.knowledgeId));
      });
    }

    function findKnowledge(id) {
      const numericID = Number(id);
      return state.knowledge.find((item) => Number(item.id) === numericID);
    }

    function openKnowledgePreview(id) {
      const item = findKnowledge(id);
      if (!item) return;
      state.activeKnowledgeId = Number(item.id);
      el.knowledgeModalTitle.textContent = item.title || "未命名经验";
      el.knowledgeModalMeta.innerHTML = [
        item.issue_domain,
        item.issue_type,
        item.last_root_cause_category,
        item.status,
      ].filter(Boolean).map((value) => `<span class="tag">${escapeHTML(value)}</span>`).join("");
      el.knowledgeModalBody.innerHTML = `
        ${knowledgeDetailBlock("典型现象", item.typical_description || "未填写")}
        ${knowledgeListBlock("排查步骤", jsonList(item.recommended_steps_json))}
        ${knowledgeListBlock("常见原因", jsonList(item.common_causes_json))}
        ${knowledgeListBlock("相关工具", jsonList(item.useful_tools_json))}
        ${knowledgeDetailBlock("最后确认原因", item.last_confirmed_reason || "未填写")}
      `;
      el.knowledgeModalStats.textContent = "命中 " + String(item.observed_case_count || 0) + " 次 · 置信度 " + formatConfidence(item.confidence);
      el.knowledgeModal.hidden = false;
      el.knowledgeModalEdit.focus();
    }

    function closeKnowledgePreview() {
      if (el.knowledgeModal.hidden) return;
      state.activeKnowledgeId = 0;
      el.knowledgeModal.hidden = true;
      el.knowledgeModalTitle.textContent = "";
      el.knowledgeModalMeta.innerHTML = "";
      el.knowledgeModalBody.innerHTML = "";
      el.knowledgeModalStats.textContent = "";
    }

    function editKnowledge(id) {
      const item = findKnowledge(id);
      if (!item) return;
      closeKnowledgePreview();
      state.editingKnowledgeId = Number(item.id);
      el.knowledgeForm.elements.id.value = item.id;
      el.knowledgeForm.elements.title.value = item.title || "";
      el.knowledgeForm.elements.issue_domain.value = item.issue_domain || "";
      el.knowledgeForm.elements.issue_type.value = item.issue_type || "";
      el.knowledgeForm.elements.typical_description.value = item.typical_description || "";
      el.knowledgeForm.elements.recommended_steps.value = jsonList(item.recommended_steps_json).join("\n");
      el.knowledgeForm.elements.common_causes.value = jsonList(item.common_causes_json).join("\n");
      el.knowledgeForm.elements.useful_tools.value = jsonList(item.useful_tools_json).join("\n");
      el.knowledgeSubmit.textContent = "保存修改";
      document.getElementById("toggleKnowledgeForm").textContent = "新建";
      el.knowledgeForm.classList.add("open");
      el.knowledgeForm.scrollIntoView({ block: "nearest" });
      el.knowledgeForm.elements.title.focus();
    }

    async function deleteKnowledge(id) {
      if (!id) return;
      try {
        const response = await fetch("/web/api/knowledge/" + encodeURIComponent(id), { method: "DELETE" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "delete failed");
        if (state.activeKnowledgeId === Number(id)) closeKnowledgePreview();
        if (state.editingKnowledgeId === Number(id)) {
          resetKnowledgeForm();
          el.knowledgeForm.classList.remove("open");
        }
        showToast("经验已删除");
        await loadOverview();
      } catch (error) {
        showToast("删除失败：" + error.message);
      }
    }

    function knowledgeDetailBlock(label, text) {
      return `
        <div class="knowledge-detail-block">
          <div class="detail-label">${escapeHTML(label)}</div>
          <div class="detail-text">${escapeHTML(text || "未填写")}</div>
        </div>
      `;
    }

    function knowledgeListBlock(label, items) {
      if (!items.length) return knowledgeDetailBlock(label, "未填写");
      return `
        <div class="knowledge-detail-block">
          <div class="detail-label">${escapeHTML(label)}</div>
          <ol class="detail-list">
            ${items.map((item) => `<li>${escapeHTML(item)}</li>`).join("")}
          </ol>
        </div>
      `;
    }

    function jsonList(value) {
      if (Array.isArray(value)) return value.map((item) => String(item).trim()).filter(Boolean);
      if (!value) return [];
      try {
        const parsed = JSON.parse(value);
        if (Array.isArray(parsed)) return parsed.map((item) => String(item).trim()).filter(Boolean);
      } catch (_) {
        return lines(value);
      }
      return [];
    }

    function formatConfidence(value) {
      const numeric = Number(value || 0);
      if (!Number.isFinite(numeric) || numeric <= 0) return "-";
      return Math.round(numeric * 100) + "%";
    }

    function renderMessages(items) {
      if (!items.length) {
        renderEmpty();
        return;
      }
      el.messages.innerHTML = items.map((item) => {
        const role = roleClass(item.role);
        return `
          <article class="msg ${role}">
            <div class="avatar">${escapeHTML(roleLabel(item.role))}</div>
            <div class="bubble">${escapeHTML(item.content || "")}</div>
          </article>
        `;
      }).join("");
      el.messages.scrollTop = el.messages.scrollHeight;
    }

    function renderEmpty() {
      el.messages.innerHTML = `
        <div class="empty">
          <div class="empty-title">等待生产问题</div>
          <div>输入文字或上传截图后，右侧会显示决策层排查步骤、工具调用和当前状态。</div>
        </div>
      `;
    }

    function renderDecisionStrip(logs) {
      const last = logs[logs.length - 1];
      const existing = el.messages.querySelector(".decision-strip");
      if (existing) existing.remove();
      if (!last) return;
      const strip = document.createElement("div");
      strip.className = "decision-strip";
      strip.textContent = `已记录 ${logs.length} 条决策 · 最新：${last.decision_type || "-"} / ${last.status || "-"}`;
      el.messages.appendChild(strip);
    }

    function renderProgress(steps) {
      if (!steps.length) {
        el.progressList.innerHTML = `
          <div class="step pending">
            <span class="step-dot"></span>
            <span><span class="step-title">等待问题输入</span><span class="step-reason">排查开始后这里会显示决策层步骤。</span></span>
          </div>
        `;
        return;
      }
      el.progressList.innerHTML = steps.map((step) => `
        <div class="step ${escapeAttr(step.status || "pending")}">
          <span class="step-dot"></span>
          <span>
            <span class="step-title">${escapeHTML(step.title || step.key)}</span>
