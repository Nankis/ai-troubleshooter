<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent 问题排查系统</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #151515;
      --rail: #232729;
      --rail-2: #202424;
      --main: #151515;
      --panel: #2a2a2a;
      --panel-2: #202020;
      --line: #373737;
      --line-soft: #2a2a2a;
      --text: #f0f0f0;
      --muted: #a5a5a5;
      --faint: #767676;
      --green: #30d158;
      --green-soft: rgba(48, 209, 88, .12);
      --red: #ff5f57;
      --yellow: #ffbd2e;
      --blue: #66a5ff;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, textarea, input, select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 390px;
      background: var(--main);
    }

    .left {
      background: linear-gradient(180deg, var(--rail), var(--rail-2));
      border-right: 1px solid var(--line);
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .traffic {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .window-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .window-dot.red { background: var(--red); }
    .window-dot.yellow { background: var(--yellow); }
    .window-dot.green { background: var(--green); }

    .left-actions {
      display: grid;
      gap: 4px;
      padding: 12px 12px 8px;
    }

    .nav-btn {
      min-height: 38px;
      border-radius: var(--radius);
      background: transparent;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      align-items: center;
      text-align: left;
      padding: 0 10px;
      color: #d8d8d8;
    }

    .nav-btn:hover, .nav-btn.active {
      background: rgba(255, 255, 255, .07);
    }

    .nav-ico {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .left-scroll {
      overflow: auto;
      padding: 0 12px 18px;
    }

    .section {
      margin: 12px 0 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 4px;
    }

    .ghost-btn {
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      height: 28px;
      min-width: 28px;
      padding: 0 8px;
    }

    .ghost-btn:hover { background: rgba(255, 255, 255, .08); color: var(--text); }

    .case-list, .tool-list, .knowledge-list {
      display: grid;
      gap: 4px;
    }

    .case-row, .tool-row, .knowledge-row {
      border-radius: var(--radius);
      padding: 9px 10px;
      color: #d7d7d7;
      background: transparent;
      min-width: 0;
    }

    .case-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      width: 100%;
      text-align: left;
    }

    .case-row:hover, .case-row.active, .tool-row:hover, .knowledge-row:hover {
      background: rgba(255, 255, 255, .07);
    }

    .truncate {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .row-title {
      min-width: 0;
      font-weight: 620;
    }

    .row-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      color: var(--green);
      border-color: rgba(48, 209, 88, .3);
      background: var(--green-soft);
    }

    .knowledge-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      color: var(--faint);
    }

    .delete-btn:hover { background: rgba(255, 95, 87, .12); color: var(--red); }

    .knowledge-form {
      display: none;
      gap: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, .18);
    }

    .knowledge-form.open { display: grid; }

    .input, .mini-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #171717;
      outline: none;
      padding: 9px 10px;
    }

    .mini-textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 140px;
    }

    .input:focus, .mini-textarea:focus, .composer textarea:focus {
      border-color: rgba(48, 209, 88, .65);
      box-shadow: 0 0 0 3px rgba(48, 209, 88, .12);
    }

    .primary-small {
      justify-self: end;
      height: 32px;
      border-radius: 7px;
      padding: 0 12px;
      background: var(--green);
      color: #061006;
      font-weight: 700;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 48px minmax(0, 1fr) auto;
      background: var(--main);
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .back {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 19px;
    }

    .back:hover { background: rgba(255, 255, 255, .08); color: var(--text); }

    .title-wrap {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .case-state {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--faint);
    }

    .pulse.on {
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(48, 209, 88, .12);
    }

    .conversation {
      overflow: auto;
      min-width: 0;
      padding: 26px clamp(22px, 7vw, 112px);
    }

    .empty {
      max-width: 820px;
      margin: 7vh auto 0;
      color: var(--muted);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 22px 0;
    }

    .empty-title {
      color: var(--text);
      font-size: 22px;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .msg {
      max-width: 900px;
      margin: 0 auto 22px;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 14px;
    }

    .avatar {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      padding-top: 2px;
    }

    .bubble {
      color: #eeeeee;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.72;
    }

    .msg.user .bubble {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .msg.system .bubble {
      color: var(--muted);
    }

    .msg.agent .avatar { color: var(--green); }

    .decision-strip {
      max-width: 900px;
      margin: 8px auto 24px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .composer-wrap {
      padding: 16px clamp(22px, 7vw, 112px) 20px;
      background: linear-gradient(180deg, rgba(21, 21, 21, 0), var(--main) 22%);
    }

    .composer {
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .composer textarea {
      width: 100%;
      min-height: 86px;
      max-height: 180px;
      resize: vertical;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      padding: 15px 16px 8px;
      line-height: 1.55;
    }

    .composer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px 10px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      color: var(--muted);
      border-radius: 7px;
      padding: 0 10px;
      cursor: pointer;
    }

    .file-label:hover { background: rgba(255, 255, 255, .07); color: var(--text); }
    .file-label input { display: none; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--text);
      color: #111;
      font-size: 20px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .send-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .right {
      min-width: 0;
      border-left: 1px solid var(--line);
      padding: 18px 16px;
      background: var(--main);
      overflow: auto;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card-title {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .progress-list {
      display: grid;
      gap: 12px;
    }

    .step {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .step-dot {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      border-radius: 50%;
      border: 2px solid var(--faint);
      background: transparent;
    }

    .step.done .step-dot {
      border-color: var(--green);
      background: var(--green);
      box-shadow: inset 0 0 0 4px var(--panel);
    }

    .step.running .step-dot {
      border-color: var(--green);
      box-shadow: 0 0 0 5px rgba(48, 209, 88, .12);
    }

    .step.failed .step-dot { border-color: var(--red); background: var(--red); }
    .step.skipped .step-dot, .step.need_more_info .step-dot { border-color: var(--yellow); }

    .step-title {
      color: #dcdcdc;
      font-weight: 630;
      line-height: 1.35;
    }

    .step-reason {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .side-block {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .kv {
      display: grid;
      gap: 10px;
      color: #d6d6d6;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .kv-ico { color: var(--muted); }
    .kv-value { color: var(--green); font-variant-numeric: tabular-nums; }

    .source-list {
      display: grid;
      gap: 8px;
      color: #d6d6d6;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      max-width: 360px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 300px minmax(0, 1fr); }
      .right { display: none; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .left { display: none; }
      .conversation, .composer-wrap { padding-left: 18px; padding-right: 18px; }
      .msg { grid-template-columns: 1fr; gap: 4px; }
      .avatar { text-align: left; }
      .title-wrap { display: block; }
      .case-state { margin-top: 2px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="traffic" aria-hidden="true">
        <span class="window-dot red"></span>
        <span class="window-dot yellow"></span>
        <span class="window-dot green"></span>
      </div>

      <div class="left-actions">
        <button class="nav-btn" type="button" id="newCase">
          <span class="nav-ico">+</span>
          <span>新对话</span>
        </button>
        <button class="nav-btn" type="button" id="refreshOverview">
          <span class="nav-ico">⌕</span>
          <span>刷新工作台</span>
        </button>
      </div>

      <div class="left-scroll">
        <section class="section">
          <div class="section-head">
            <span>问题</span>
            <span class="tag" id="caseCount">0</span>
          </div>
          <div class="case-list" id="caseList"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <span>已注册 Gateway Tools</span>
            <span class="tag" id="toolCount">0</span>
          </div>
          <div class="tool-list" id="toolList"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <span>平台经验沉淀</span>
            <button class="ghost-btn" type="button" id="toggleKnowledgeForm">录入</button>
          </div>
          <form class="knowledge-form" id="knowledgeForm">
            <input class="input" name="title" placeholder="经验标题">
            <input class="input" name="issue_domain" placeholder="领域，例如 health_food">
            <input class="input" name="issue_type" placeholder="类型，例如 每日推荐缺失">
            <textarea class="mini-textarea" name="typical_description" placeholder="典型现象"></textarea>
            <textarea class="mini-textarea" name="recommended_steps" placeholder="排查步骤，每行一条"></textarea>
            <button class="primary-small" type="submit">保存经验</button>
          </form>
          <div class="knowledge-list" id="knowledgeList"></div>
        </section>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="back" type="button" id="backButton" aria-label="返回">‹</button>
        <div class="title-wrap">
          <h1>agent 问题排查系统</h1>
          <div class="case-state">
            <span class="pulse" id="runPulse"></span>
            <span id="runStatus">ready</span>
          </div>
        </div>
      </header>

      <section class="conversation" id="messages">
        <div class="empty">
          <div class="empty-title">等待生产问题</div>
          <div>输入文字或上传截图后，右侧会显示决策层排查步骤、工具调用和当前状态。</div>
        </div>
      </section>

      <div class="composer-wrap">
        <form class="composer" id="chatForm">
          <textarea id="message" name="message" placeholder="描述问题，例如：health-food 用户 123 今日推荐没有生成，时间 2026-05-23 10:00"></textarea>
          <div class="composer-bar">
            <label class="file-label">
              <input id="images" name="images" type="file" accept="image/*" multiple>
              <span>＋ 截图</span>
              <span class="tag" id="fileCount">0</span>
            </label>
            <button class="send-btn" type="submit" id="send" aria-label="发送">↑</button>
          </div>
        </form>
      </div>
    </main>

    <aside class="right">
      <div class="status-card">
        <div class="card-title">进度</div>
        <div class="progress-list" id="progressList"></div>

        <div class="side-block">
          <div class="card-title">环境信息</div>
          <div class="kv">
            <div class="kv-row"><span class="kv-ico">◇</span><span>状态</span><span class="kv-value" id="caseStatus">ready</span></div>
            <div class="kv-row"><span class="kv-ico">▣</span><span>工具</span><span class="kv-value" id="envTools">0</span></div>
            <div class="kv-row"><span class="kv-ico">⌘</span><span>知识</span><span class="kv-value" id="envKnowledge">0</span></div>
            <div class="kv-row"><span class="kv-ico">⌁</span><span>来源</span><span class="kv-value" id="caseSource">web</span></div>
          </div>
        </div>

        <div class="side-block">
          <div class="card-title">来源</div>
          <div class="source-list">
            <div>Gateway tools</div>
            <div>平台经验 DB</div>
            <div>Web Chat 输入</div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      currentCaseNo: "",
      polling: null,
      tools: [],
      knowledge: [],
      cases: [],
      processing: false,
    };

    const el = {
      form: document.getElementById("chatForm"),
      send: document.getElementById("send"),
      status: document.getElementById("runStatus"),
      pulse: document.getElementById("runPulse"),
      messages: document.getElementById("messages"),
      message: document.getElementById("message"),
      images: document.getElementById("images"),
      fileCount: document.getElementById("fileCount"),
      caseList: document.getElementById("caseList"),
      caseCount: document.getElementById("caseCount"),
      toolList: document.getElementById("toolList"),
      toolCount: document.getElementById("toolCount"),
      knowledgeList: document.getElementById("knowledgeList"),
      knowledgeForm: document.getElementById("knowledgeForm"),
      progressList: document.getElementById("progressList"),
      caseStatus: document.getElementById("caseStatus"),
      envTools: document.getElementById("envTools"),
      envKnowledge: document.getElementById("envKnowledge"),
      caseSource: document.getElementById("caseSource"),
      toast: document.getElementById("toast"),
    };

    document.getElementById("newCase").addEventListener("click", resetCase);
    document.getElementById("refreshOverview").addEventListener("click", loadOverview);
    document.getElementById("backButton").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    document.getElementById("toggleKnowledgeForm").addEventListener("click", () => {
      el.knowledgeForm.classList.toggle("open");
    });

    el.images.addEventListener("change", updateFileCount);
    el.form.addEventListener("paste", handleComposerPaste);

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = el.message.value.trim();
      if (!text && el.images.files.length === 0) return;

      const data = new FormData();
      data.append("message", text);
      data.append("async", "1");
      if (state.currentCaseNo) data.append("case_no", state.currentCaseNo);
      for (const file of el.images.files) data.append("images", file);

      setBusy(true);
      try {
        const response = await fetch("/web/api/chat", { method: "POST", body: data });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "request failed");
        state.currentCaseNo = payload.case.case_no;
        applyCasePayload(payload);
        startPolling(state.currentCaseNo);
        el.message.value = "";
        clearImages();
        await loadOverview();
      } catch (error) {
        showToast("请求失败：" + error.message);
        setBusy(false);
      }
    });

    el.knowledgeForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(el.knowledgeForm);
      const payload = {
        title: data.get("title"),
        issue_domain: data.get("issue_domain"),
        issue_type: data.get("issue_type"),
        typical_description: data.get("typical_description"),
        recommended_steps: lines(data.get("recommended_steps")),
      };
      try {
        const response = await fetch("/web/api/knowledge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const saved = await response.json();
        if (!response.ok) throw new Error(saved.error || "save failed");
        el.knowledgeForm.reset();
        el.knowledgeForm.classList.remove("open");
        showToast("经验已保存");
        await loadOverview();
      } catch (error) {
        showToast("保存失败：" + error.message);
      }
    });

    async function loadOverview() {
      const response = await fetch("/web/api/overview");
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "overview failed");
      state.tools = payload.tools || [];
      state.knowledge = payload.knowledge || [];
      state.cases = payload.cases || [];
      renderCases();
      renderTools();
      renderKnowledge();
      el.envTools.textContent = String(state.tools.length);
      el.envKnowledge.textContent = String(state.knowledge.length);
    }

    function resetCase() {
      stopPolling();
      state.currentCaseNo = "";
      setBusy(false);
      el.message.value = "";
      clearImages();
      renderEmpty();
      renderProgress([]);
      el.caseStatus.textContent = "ready";
      el.caseSource.textContent = "web";
      document.querySelectorAll(".case-row.active").forEach((node) => node.classList.remove("active"));
    }

    function handleComposerPaste(event) {
      const files = imageFilesFromClipboard(event.clipboardData);
      if (files.length === 0) return;
      if (!appendImageFiles(files)) return;
      event.preventDefault();
      showToast(files.length === 1 ? "已粘贴 1 张截图" : "已粘贴 " + files.length + " 张截图");
    }

    function imageFilesFromClipboard(clipboardData) {
      if (!clipboardData || !clipboardData.items) return [];
      const files = [];
      for (const item of clipboardData.items) {
        if (item.kind !== "file" || !item.type.startsWith("image/")) continue;
        const blob = item.getAsFile();
        if (!blob) continue;
        files.push(toNamedImageFile(blob, files.length));
      }
      return files;
    }

    function toNamedImageFile(blob, index) {
      const type = blob.type || "image/png";
      const name = "pasted-" + compactTimestamp() + "-" + String(index + 1) + "." + imageExtension(type);
      if (typeof File === "function") {
        return new File([blob], name, { type, lastModified: Date.now() });
      }
      return blob;
    }

    function appendImageFiles(files) {
      if (files.length === 0) return false;
      if (typeof DataTransfer !== "function") {
        showToast("当前浏览器不支持粘贴图片");
        return false;
      }
      const transfer = new DataTransfer();
      for (const file of el.images.files) transfer.items.add(file);
      for (const file of files) transfer.items.add(file);
      el.images.files = transfer.files;
      updateFileCount();
      return true;
    }

    function updateFileCount() {
      el.fileCount.textContent = String(el.images.files.length);
    }

    function clearImages() {
      el.images.value = "";
      updateFileCount();
    }

    function imageExtension(type) {
      if (type === "image/jpeg") return "jpg";
      if (type === "image/webp") return "webp";
      if (type === "image/gif") return "gif";
      return "png";
    }

    function compactTimestamp() {
      return new Date().toISOString().replace(/[-:.TZ]/g, "").slice(0, 14);
    }

    function startPolling(caseNo) {
      stopPolling();
      pollCase(caseNo);
      state.polling = window.setInterval(() => pollCase(caseNo), 1200);
    }

    function stopPolling() {
      if (state.polling) window.clearInterval(state.polling);
      state.polling = null;
    }

    async function pollCase(caseNo) {
      try {
        const response = await fetch("/web/api/cases/" + encodeURIComponent(caseNo));
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "case status failed");
        applyCasePayload(payload);
        if (!payload.processing) {
          stopPolling();
          setBusy(false);
          await loadOverview();
        }
      } catch (error) {
        stopPolling();
        setBusy(false);
        showToast("状态刷新失败：" + error.message);
      }
    }

    function applyCasePayload(payload) {
      const c = payload.case || {};
      state.currentCaseNo = c.case_no || state.currentCaseNo;
      renderMessages(payload.messages || []);
      renderProgress(payload.progress || []);
      renderDecisionStrip(payload.ai_decision_logs || []);
      setBusy(Boolean(payload.processing));
      el.caseStatus.textContent = c.status || "ready";
      el.caseSource.textContent = c.source || "web";
      highlightCurrentCase();
    }

    function renderCases() {
      el.caseCount.textContent = String(state.cases.length);
      if (!state.cases.length) {
        el.caseList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无问题会话</div>`;
        return;
      }
      el.caseList.innerHTML = state.cases.map((item) => `
        <button class="case-row ${item.case_no === state.currentCaseNo ? "active" : ""}" type="button" data-case="${escapeAttr(item.case_no)}">
          <span class="truncate">
            <span class="row-title truncate">${escapeHTML(caseTitle(item))}</span>
            <span class="row-meta truncate">${escapeHTML(item.issue_domain || item.source || "web")}</span>
          </span>
          <span class="tag ${isActive(item.status) ? "green" : ""}">${escapeHTML(shortStatus(item.status))}</span>
        </button>
      `).join("");
      el.caseList.querySelectorAll("[data-case]").forEach((button) => {
        button.addEventListener("click", () => {
          state.currentCaseNo = button.dataset.case || "";
          startPolling(state.currentCaseNo);
        });
      });
    }

    function renderTools() {
      el.toolCount.textContent = String(state.tools.length);
      if (!state.tools.length) {
        el.toolList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无工具</div>`;
        return;
      }
      el.toolList.innerHTML = state.tools.slice(0, 18).map((item) => `
        <div class="tool-row">
          <div class="row-title truncate">${escapeHTML(item.name)}</div>
          <div class="row-meta">${escapeHTML(item.description || item.required_scope || "")}</div>
        </div>
      `).join("");
    }

    function renderKnowledge() {
      if (!state.knowledge.length) {
        el.knowledgeList.innerHTML = `<div class="row-meta" style="padding: 8px 10px;">暂无沉淀经验</div>`;
        return;
      }
      el.knowledgeList.innerHTML = state.knowledge.map((item) => `
        <div class="knowledge-row">
          <span class="truncate">
            <span class="row-title truncate">${escapeHTML(item.title)}</span>
            <span class="row-meta truncate">${escapeHTML([item.issue_domain, item.issue_type].filter(Boolean).join(" · "))}</span>
          </span>
          <button class="delete-btn" type="button" data-knowledge-id="${item.id}" aria-label="删除经验">×</button>
        </div>
      `).join("");
      el.knowledgeList.querySelectorAll("[data-knowledge-id]").forEach((button) => {
        button.addEventListener("click", () => deleteKnowledge(button.dataset.knowledgeId));
      });
    }

    async function deleteKnowledge(id) {
      if (!id) return;
      try {
        const response = await fetch("/web/api/knowledge/" + encodeURIComponent(id), { method: "DELETE" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "delete failed");
        showToast("经验已删除");
        await loadOverview();
      } catch (error) {
        showToast("删除失败：" + error.message);
      }
    }

    function renderMessages(items) {
      if (!items.length) {
        renderEmpty();
        return;
      }
      el.messages.innerHTML = items.map((item) => {
        const role = roleClass(item.role);
        return `
          <article class="msg ${role}">
            <div class="avatar">${escapeHTML(roleLabel(item.role))}</div>
            <div class="bubble">${escapeHTML(item.content || "")}</div>
          </article>
        `;
      }).join("");
      el.messages.scrollTop = el.messages.scrollHeight;
    }

    function renderEmpty() {
      el.messages.innerHTML = `
        <div class="empty">
          <div class="empty-title">等待生产问题</div>
          <div>输入文字或上传截图后，右侧会显示决策层排查步骤、工具调用和当前状态。</div>
        </div>
      `;
    }

    function renderDecisionStrip(logs) {
      const last = logs[logs.length - 1];
      const existing = el.messages.querySelector(".decision-strip");
      if (existing) existing.remove();
      if (!last) return;
      const strip = document.createElement("div");
      strip.className = "decision-strip";
      strip.textContent = `已记录 ${logs.length} 条决策 · 最新：${last.decision_type || "-"} / ${last.status || "-"}`;
      el.messages.appendChild(strip);
    }

    function renderProgress(steps) {
      if (!steps.length) {
        el.progressList.innerHTML = `
          <div class="step pending">
            <span class="step-dot"></span>
            <span><span class="step-title">等待问题输入</span><span class="step-reason">排查开始后这里会显示决策层步骤。</span></span>
          </div>
        `;
        return;
      }
      el.progressList.innerHTML = steps.map((step) => `
        <div class="step ${escapeAttr(step.status || "pending")}">
          <span class="step-dot"></span>
          <span>
            <span class="step-title">${escapeHTML(step.title || step.key)}</span>
            <span class="step-reason">${escapeHTML(step.reason || statusText(step.status))}</span>
          </span>
        </div>
      `).join("");
    }

    function setBusy(value) {
      state.processing = value;
      el.send.disabled = value;
      el.status.textContent = value ? "investigating" : "ready";
      el.pulse.classList.toggle("on", value);
    }

    function highlightCurrentCase() {
      document.querySelectorAll(".case-row").forEach((row) => {
        row.classList.toggle("active", row.dataset.case === state.currentCaseNo);
      });
    }

    function caseTitle(item) {
      const text = (item.original_text || item.case_no || "").replace(/\s+/g, " ").trim();
      return text || item.case_no || "未命名问题";
    }

    function shortStatus(status) {
      const map = {
        NEW: "新建",
        READY_TO_INVESTIGATE: "准备",
        INVESTIGATING: "排查中",
        WAITING_TOOL_RESULT: "查证据",
        NEED_MORE_INFO: "待补充",
        WAITING_USER_REPLY: "待回复",
        NEED_HUMAN_CONFIRMATION: "待确认",
        DONE: "完成",
        FAILED: "失败",
      };
      return map[status] || status || "-";
    }

    function isActive(status) {
      return ["READY_TO_INVESTIGATE", "INVESTIGATING", "WAITING_TOOL_RESULT"].includes(status);
    }

    function statusText(status) {
      const map = {
        pending: "等待执行",
        running: "正在执行",
        done: "已完成",
        failed: "失败",
        skipped: "已跳过",
        need_more_info: "需要补充信息",
      };
      return map[status] || "";
    }

    function roleClass(role) {
      if (role === "user") return "user";
      if (role === "system") return "system";
      return "agent";
    }

    function roleLabel(role) {
      if (role === "user") return "你";
      if (role === "system") return "系统";
      return "agent";
    }

    function lines(value) {
      return String(value || "").split(/\r?\n/).map((item) => item.trim()).filter(Boolean);
    }

    function showToast(text) {
      el.toast.textContent = text;
      el.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => el.toast.classList.remove("show"), 2600);
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, "&#96;");
    }

    renderProgress([]);
    loadOverview().catch((error) => showToast("工作台加载失败：" + error.message));
  </script>
</body>
</html>
