            <span class="step-reason">${escapeHTML(step.reason || statusText(step.status))}</span>
          </span>
        </div>
      `).join("");
    }

    function setBusy(value) {
      state.processing = value;
      el.send.disabled = value;
      el.status.textContent = value ? "investigating" : "ready";
      el.pulse.classList.toggle("on", value);
    }

    function loadCaseReads() {
      try {
        const raw = window.localStorage.getItem(CASE_READ_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
      } catch (_) {
        return {};
      }
    }

    function saveCaseReads() {
      try {
        window.localStorage.setItem(CASE_READ_STORAGE_KEY, JSON.stringify(state.caseReads));
      } catch (_) {
        showToast("问题已读状态本地保存失败");
      }
    }

    function syncCaseReadState(cases) {
      const firstLoad = !state.overviewLoadedOnce;
      const nextSeen = {};
      let changed = false;
      for (const item of cases) {
        const caseNo = String(item.case_no || "");
        if (!caseNo) continue;
        const status = String(item.status || "");
        const revision = caseRevision(item);
        nextSeen[caseNo] = { status, revision };
        if (caseNo === state.currentCaseNo) {
          changed = markCaseViewed(item, { save: false }) || changed;
          continue;
        }
        if (!isReviewableStatus(status) || state.caseReads[caseNo] === revision) continue;
        if (firstLoad && !updatedDuringCurrentSession(item)) {
          state.caseReads[caseNo] = revision;
          changed = true;
        }
      }
      state.caseSeen = nextSeen;
      state.overviewLoadedOnce = true;
      if (changed) saveCaseReads();
    }

    function markCaseViewed(item, options = {}) {
      const caseNo = String(item && item.case_no || "");
      if (!caseNo) return false;
      const revision = caseRevision(item);
      if (state.caseReads[caseNo] === revision) return false;
      state.caseReads[caseNo] = revision;
      if (options.save !== false) saveCaseReads();
      return true;
    }

    function mergeCaseIntoList(item) {
      if (!item || !item.case_no) return;
      const index = state.cases.findIndex((entry) => entry.case_no === item.case_no);
      if (index >= 0) {
        state.cases[index] = { ...state.cases[index], ...item };
        return;
      }
      state.cases.unshift(item);
    }

    function caseRevision(item) {
      return String(item.updated_at || item.updatedAt || item.version || item.status || "");
    }

    function updatedDuringCurrentSession(item) {
      const raw = item.updated_at || item.updatedAt || "";
      const updatedAt = Date.parse(raw);
      return Number.isFinite(updatedAt) && updatedAt >= state.appStartedAt - 5000;
    }

    function caseRowClasses(item) {
      const classes = ["case-row"];
      if (caseRowActive(item)) classes.push("active");
      if (caseProcessing(item)) classes.push("running");
      if (caseNeedsView(item)) classes.push("needs-view");
      return classes.join(" ");
    }

    function caseStatusHTML(item) {
      const meta = caseStatusMeta(item);
      return `
        <span class="case-status ${escapeAttr(meta.className)}" aria-label="${escapeAttr(meta.title)}" title="${escapeAttr(meta.title)}">
          ${meta.icon || ""}${escapeHTML(meta.label)}
        </span>
      `;
    }

    function caseStatusMeta(item) {
      if (item.isDraft) return { label: "草稿", className: "draft", title: "草稿" };
      if (caseProcessing(item)) {
        return {
          label: "排查中",
          className: "running",
          title: "AI 正在排查",
          icon: `<span class="status-spinner" aria-hidden="true"></span>`,
        };
      }
      if (caseNeedsView(item)) {
        return {
          label: "待查看",
          className: "review",
          title: "AI 已有结果，点击查看",
          icon: `<span class="status-dot" aria-hidden="true"></span>`,
        };
      }
      const status = String(item.status || "");
      if (status === "FAILED") return { label: "失败", className: "failed", title: "排查失败" };
      if (status === "DONE") return { label: "完成", className: "done", title: "已完成" };
      if (status === "NEED_MORE_INFO" || status === "WAITING_USER_REPLY" || status === "NEED_HUMAN_CONFIRMATION") {
        return { label: shortStatus(status), className: "waiting", title: shortStatus(status) };
      }
      return { label: shortStatus(status), className: "", title: shortStatus(status) };
    }

    function caseProcessing(item) {
      if (item.isDraft) return false;
      return isActive(item.status) || (item.case_no === state.currentCaseNo && state.processing);
    }

    function caseNeedsView(item) {
      if (item.isDraft || caseProcessing(item)) return false;
      const caseNo = String(item.case_no || "");
      return isReviewableStatus(item.status) && caseNo && state.caseReads[caseNo] !== caseRevision(item);
    }

    function isReviewableStatus(status) {
      return ["NEED_HUMAN_CONFIRMATION", "DONE", "FAILED"].includes(String(status || ""));
    }

    function highlightCurrentCase() {
      document.querySelectorAll(".case-row").forEach((row) => {
        const caseButton = row.querySelector("[data-case-open]");
        const draftButton = row.querySelector("[data-draft-open]");
        row.classList.toggle("active",
          (caseButton && caseButton.dataset.caseOpen === state.currentCaseNo) ||
          (draftButton && draftButton.dataset.draftOpen === state.currentDraftID));
      });
    }

    function caseRowActive(item) {
      if (item.isDraft) return item.draft_id === state.currentDraftID;
      return item.case_no === state.currentCaseNo;
    }

    function caseTitle(item) {
      const text = (item.title || item.original_text || item.case_no || "").replace(/\s+/g, " ").trim();
      return text || item.case_no || "未命名问题";
    }

    function draftTitle(text) {
      const value = String(text || "").replace(/\s+/g, " ").trim();
      return value ? value.slice(0, 40) : "新问题";
    }

    function compactTitle(text) {
      return String(text || "").replace(/\s+/g, " ").trim().slice(0, 80);
    }

    function shortStatus(status) {
      const map = {
        NEW: "新建",
        READY_TO_INVESTIGATE: "准备",
        INVESTIGATING: "排查中",
        WAITING_TOOL_RESULT: "查证据",
        NEED_MORE_INFO: "待补充",
        WAITING_USER_REPLY: "待回复",
        NEED_HUMAN_CONFIRMATION: "待确认",
        DONE: "完成",
        FAILED: "失败",
      };
      return map[status] || status || "-";
    }

    function capabilityStatusText(status) {
      const map = {
        draft: "草稿",
        enabled: "已发布",
        disabled: "已停用",
        rejected: "已拒绝",
      };
      return map[status] || status || "-";
    }

    function safetyStatusText(status) {
      const map = {
        readonly_candidate: "只读候选",
        needs_review: "待审核",
        rejected: "危险拒绝",
      };
      return map[status] || status || "-";
    }

    function statusTagClass(status) {
      if (status === "enabled") return "green";
      if (status === "rejected") return "red";
      if (status === "draft") return "yellow";
      return "";
    }

    function safetyTagClass(status) {
      if (status === "readonly_candidate") return "green";
      if (status === "rejected") return "red";
      return "yellow";
    }

    function isActive(status) {
      return ["READY_TO_INVESTIGATE", "INVESTIGATING", "WAITING_TOOL_RESULT"].includes(status);
    }

    function statusText(status) {
      const map = {
        pending: "等待执行",
        running: "正在执行",
        done: "已完成",
        failed: "失败",
        skipped: "已跳过",
        need_more_info: "需要补充信息",
      };
      return map[status] || "";
    }

    function roleClass(role) {
      if (role === "user") return "user";
      if (role === "system") return "system";
      return "agent";
    }

    function roleLabel(role) {
      if (role === "user") return "你";
      if (role === "system") return "系统";
      return "agent";
    }

    function lines(value) {
      return String(value || "").split(/\r?\n/).map((item) => item.trim()).filter(Boolean);
    }

    function showToast(text) {
      el.toast.textContent = text;
      el.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => el.toast.classList.remove("show"), 2600);
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, "&#96;");
    }

    loadDrafts();
    renderCases();
    renderProgress([]);
    loadOverview().catch((error) => showToast("工作台加载失败：" + error.message));
    window.setInterval(() => {
      if (document.hidden || state.toolRefreshing) return;
      loadOverview().catch(() => {});
    }, 30000);
  </script>
</body>
</html>
