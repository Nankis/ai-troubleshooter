server:
  env: dev
  http_port: 8080

database:
  driver: mysql
  # Example: ai_user:replace-with-db-password@tcp(mysql.example.internal:3306)/ai_troubleshooter?parseTime=true&loc=Local
  # Keep secrets in runtime env. Use DB_DRIVER=memory only for explicit local smoke tests.
  dsn: ""

connectors:
  # mock: built-in local demo connector
  # http: call company-provided readonly APIs defined in docs/ai-connector-integration.md
  mode: mock
  api_key: ""
  timeout_seconds: 5
  market_base_url: ""
  asset_base_url: ""
  ops_base_url: ""
  health_food_base_url: ""

gateway:
  auth_enabled: false
  agent_id: business-troubleshooter-v1
  # Runtime env format:
  # GATEWAY_BEARER_TOKENS=business-troubleshooter-v1:replace-with-strong-token
  # Preferred configurable policy:
  # GATEWAY_AGENT_CONFIG_FILE=configs/gateway-agents.example.json
  # BUSINESS_TROUBLESHOOTER_GATEWAY_TOKEN=replace-with-strong-token
  bearer_tokens: {}
  agents_config_file: ""
  allow_unauthenticated_list_tools: false
  agent_qps: 20
  user_qps: 10
  tool_qps: 20

control_api:
  auth_enabled: false
  # Runtime env format:
  # CONTROL_API_BEARER_TOKENS=replace-with-internal-control-token
  bearer_tokens: []

limits:
  default_tool_timeout_seconds: 5
