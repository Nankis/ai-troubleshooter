server:
  env: dev
  http_port: 8080

lark:
  # lark: global Lark, default OpenAPI base URL https://open.larksuite.com
  # feishu: Feishu China, default OpenAPI base URL https://open.feishu.cn
  platform: lark
  app_id: ""
  app_secret: ""
  # Optional. Leave empty to use the platform default.
  api_base_url: ""
  verification_token: ""
  encrypt_key: ""
  allowed_chat_ids:
    - oc_dev

llm:
  provider: local_rules
  base_url: ""
  api_key: ""
  model: rules-v1
  timeout_seconds: 30
  max_concurrency: 10

vision:
  # same_as_llm: reuse the main LLM config for image analysis if the model supports vision.
  # local_mock: local deterministic image text mock for smoke tests.
  # qwen_openai_compatible: explicitly use DashScope/Qwen-VL through OpenAI-compatible chat completions.
  provider: same_as_llm
  base_url: ""
  api_key: ""
  model: ""
  timeout_seconds: 30
  max_images_per_message: 3
  max_image_bytes: 10485760

database:
  driver: mysql
  # Example: ai_user:replace-with-db-password@tcp(mysql.example.internal:3306)/ai_troubleshooter?parseTime=true&loc=Local
  # Empty dsn falls back to in-memory store for local smoke tests.
  dsn: ""

queue:
  type: memory
  redis_addr: ""
  stream_name: case_events

connectors:
  # mock: use built-in mock connector for local demo
  # http: call company-provided readonly APIs defined in docs/ai-connector-integration.md
  mode: mock
  api_key: ""
  timeout_seconds: 5
  market_base_url: ""
  asset_base_url: ""
  ops_base_url: ""

gateway:
  auth_enabled: false
  # Runtime env format:
  # GATEWAY_BEARER_TOKENS=business-troubleshooter-v1:replace-with-strong-token
  bearer_tokens: {}
  allow_unauthenticated_list_tools: false
  agent_qps: 20
  user_qps: 10
  tool_qps: 20

control_api:
  auth_enabled: false
  # Runtime env format:
  # CONTROL_API_BEARER_TOKENS=replace-with-internal-control-token
  bearer_tokens: []

tool_gateway:
  endpoint: http://localhost:8080
  client_id: dev-client
  client_secret: ""

limits:
  max_tool_calls_per_case: 10
  max_llm_calls_per_case: 8
  max_tool_failures_per_case: 3
  max_investigation_seconds: 120
  default_log_time_range_minutes: 30
  default_tool_timeout_seconds: 5
